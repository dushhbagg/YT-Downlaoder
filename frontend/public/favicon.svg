<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#150f2e"/>
      <stop offset="100%" stop-color="#05020a"/>
    </linearGradient>
    
    <!-- Outer Glow Ring -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="50%" stop-color="#ba3eff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Play/Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3e75"/>
      <stop offset="100%" stop-color="#9d1eff"/>
    </linearGradient>

    <!-- Drop Shadow and Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer Glow Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#ringGrad)" stroke-width="12" stroke-opacity="0.85"/>

  <!-- Glowing Icon Center -->
  <g filter="url(#glow)">
    <!-- Tilted play button acting as a downward download arrow -->
    <path d="M180 130 L380 256 L180 382 Z" fill="url(#arrowGrad)" transform="rotate(90 256 256) translate(0, -15)" />
    
    <!-- Download base line -->
    <rect x="156" y="390" width="200" height="32" rx="16" fill="#ffffff" opacity="0.95"/>
  </g>
</svg>